apiVersion: apps/v1
kind: Deployment
metadata:
  name: prestige-motors
  namespace: luxury-cars
  labels:
    app: prestige-motors
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: prestige-motors
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: prestige-motors
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: prestige-motors
          image: johannkarunya28/prestige-motors:latest   # updated by Jenkinsfile
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              protocol: TCP

          env:
            - name: FLASK_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: APP_VERSION
              value: "1.0.0"
            - name: PAYPAL_SERVICE_URL
              value: "https://payment-w1qr.onrender.com"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: prestige-motors-secrets
                  key: API_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Liveness probe — restarts pod if app becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe — gates traffic until pod is ready
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 3

      restartPolicy: Always
