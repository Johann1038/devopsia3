# ════════════════════════════════════════════════════════════════════════════
# Ansible Inventory — Prestige Motors (Local / No Remote Server)
#
# Since there is no remote server, everything targets localhost.
# ansible_connection=local means Ansible runs directly on this machine
# without SSH — perfect for a local dev/demo/submission setup.
#
# To switch to a real server later, replace 127.0.0.1 with the server IP
# and change ansible_connection=local to ansible_ssh_private_key_file=~/.ssh/key
# ════════════════════════════════════════════════════════════════════════════

[jenkins_server]
localhost ansible_host=127.0.0.1 ansible_connection=local

[k8s_master]
localhost ansible_host=127.0.0.1 ansible_connection=local

[k8s_workers]
localhost ansible_host=127.0.0.1 ansible_connection=local

[k8s_cluster:children]
k8s_master
k8s_workers

[all:vars]
ansible_python_interpreter=/usr/bin/python3
