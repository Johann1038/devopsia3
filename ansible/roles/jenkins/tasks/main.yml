---
# ════════════════════════════════════════════════════════════════════════════
# Role: jenkins — Verify Jenkins container is running
# ════════════════════════════════════════════════════════════════════════════

- name: Check Jenkins container is running
  command: docker inspect jenkins
  register: jenkins_status
  changed_when: false
  ignore_errors: true

- name: Print Jenkins container status
  debug:
    msg: "Jenkins container found and inspected"
  when: jenkins_status.rc == 0

- name: Check Jenkins is responding
  command: docker exec jenkins curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login
  register: jenkins_http
  changed_when: false
  ignore_errors: true

- name: Print Jenkins HTTP status
  debug:
    msg: "Jenkins HTTP response code: {{ jenkins_http.stdout | default('unreachable') }}"

- name: List Jenkins jobs
  command: docker exec jenkins ls /var/jenkins_home/jobs/
  register: jenkins_jobs
  changed_when: false
  ignore_errors: true

- name: Print Jenkins jobs
  debug:
    msg: "Jenkins jobs: {{ jenkins_jobs.stdout_lines | default(['No jobs found']) }}"
