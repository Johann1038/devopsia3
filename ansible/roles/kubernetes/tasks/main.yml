---
# ════════════════════════════════════════════════════════════════════════════
# Role: kubernetes — Verify kubectl is installed and cluster is reachable
# ════════════════════════════════════════════════════════════════════════════

- name: Check kubectl is installed
  command: kubectl version --client --output=yaml
  register: kubectl_version
  changed_when: false

- name: Print kubectl version
  debug:
    msg: "kubectl installed: {{ kubectl_version.stdout_lines[0] }}"

- name: Check Kubernetes cluster nodes
  command: kubectl get nodes
  register: k8s_nodes
  changed_when: false
  ignore_errors: true

- name: Print cluster nodes
  debug:
    msg: "{{ k8s_nodes.stdout_lines }}"

- name: Check pods in luxury-cars namespace
  command: kubectl get pods -n luxury-cars
  register: k8s_pods
  changed_when: false
  ignore_errors: true

- name: Print running pods
  debug:
    msg: "{{ k8s_pods.stdout_lines }}"

- name: Check HPA in luxury-cars namespace
  command: kubectl get hpa -n luxury-cars
  register: k8s_hpa
  changed_when: false
  ignore_errors: true

- name: Print HPA status
  debug:
    msg: "{{ k8s_hpa.stdout_lines }}"
