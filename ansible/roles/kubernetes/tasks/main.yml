---
# ════════════════════════════════════════════════════════════════════════════
# Role: kubernetes — Install kubectl on Ubuntu/Debian hosts
# ════════════════════════════════════════════════════════════════════════════

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Kubernetes GPG key
  apt_key:
    url: https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key
    state: present

- name: Add Kubernetes apt repository
  apt_repository:
    repo: "deb https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
    state: present
    filename: kubernetes

- name: Update apt cache after adding Kubernetes repo
  apt:
    update_cache: true

- name: Install kubectl
  apt:
    name: kubectl
    state: present
  notify: Verify kubectl

- name: Hold kubectl at installed version (prevent unintended upgrades)
  dpkg_selections:
    name: kubectl
    selection: hold

- name: Create .kube directory for the ansible user
  file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Copy kubeconfig to the ansible user's home (if kubeconfig_src is defined)
  copy:
    src: "{{ kubeconfig_src }}"
    dest: "/home/{{ ansible_user }}/.kube/config"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  when: kubeconfig_src is defined

- name: Verify kubectl installation
  command: kubectl version --client --output=yaml
  register: kubectl_version
  changed_when: false

- name: Print kubectl version
  debug:
    msg: "kubectl installed: {{ kubectl_version.stdout_lines[0] }}"
