---
# ════════════════════════════════════════════════════════════════════════════
# Role: docker — Verify Docker Engine is installed and running
# ════════════════════════════════════════════════════════════════════════════

- name: Check Docker is installed
  command: docker --version
  register: docker_version
  changed_when: false

- name: Print Docker version
  debug:
    msg: "Docker installed: {{ docker_version.stdout }}"

- name: Check Docker daemon is running
  command: docker info
  register: docker_info
  changed_when: false

- name: Print Docker daemon status
  debug:
    msg: "Docker daemon is running"

- name: List running containers
  command: docker ps
  register: docker_containers
  changed_when: false

- name: Print running containers
  debug:
    msg: "{{ docker_containers.stdout_lines }}"
