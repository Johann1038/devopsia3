# ════════════════════════════════════════════════════════════════════════════
# Prestige Motors — GitHub Actions CI/CD Pipeline
# Stages: Checkout → Build → Test → Push → Deploy
# ════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_USER: johannkarunya28
  IMAGE_NAME: johannkarunya28/prestige-motors

jobs:

  # ── Stage 1 & 2: Checkout + Build ─────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            --target runtime \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg VCS_REF=${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          echo "Image built: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          docker images ${{ env.IMAGE_NAME }}

      - name: Save image as artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.run_number }} | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar.gz
          retention-days: 1

  # ── Stage 3: Test ─────────────────────────────────────────────────────────
  test:
    name: Run Pytest Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Run unit tests
        run: |
          docker run --rm \
            --name prestige-test \
            --entrypoint "" \
            -e FLASK_ENV=testing \
            ${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            /opt/venv/bin/pytest backend/tests/ -v --tb=short --junitxml=/tmp/test-results.xml

      - name: Extract test results
        if: always()
        run: |
          CONTAINER_ID=$(docker create ${{ env.IMAGE_NAME }}:${{ github.run_number }})
          docker cp ${CONTAINER_ID}:/tmp/test-results.xml ./test-results.xml || true
          docker rm ${CONTAINER_ID} || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ── Stage 4: Push to Docker Hub ───────────────────────────────────────────
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < image.tar.gz

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push versioned and latest tags
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ github.run_number }}
          docker push ${{ env.IMAGE_NAME }}:latest
          echo "Pushed ${{ env.IMAGE_NAME }}:${{ github.run_number }} and :latest"

  # ── Stage 5: Deploy to Kubernetes ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Roll out new image
        run: |
          kubectl set image deployment/prestige-motors \
            prestige-motors=${{ env.IMAGE_NAME }}:${{ github.run_number }} \
            -n luxury-cars

          kubectl set env deployment/prestige-motors \
            PAYPAL_SERVICE_URL=${{ secrets.PAYPAL_SERVICE_URL }} \
            -n luxury-cars

          kubectl rollout status deployment/prestige-motors \
            -n luxury-cars --timeout=180s

      - name: Show deployment status
        run: |
          kubectl get pods -n luxury-cars -o wide
          kubectl get svc  -n luxury-cars
          kubectl get hpa  -n luxury-cars
